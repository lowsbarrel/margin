name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ── App: Tauri builds for macOS / Linux / Windows ────────────────────────
  tauri-build:
    name: App — Build ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS (Apple Silicon)
            runner: macos-latest
            target: aarch64-apple-darwin
          - name: macOS (Intel)
            runner: macos-latest
            target: x86_64-apple-darwin
          - name: Linux
            runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - name: Windows
            runner: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Install JS dependencies
        working-directory: app
        run: pnpm install --frozen-lockfile

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri -> target

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: libwebkit2gtk-4.1-dev librsvg2-dev patchelf libssl-dev libgtk-3-dev libayatana-appindicator3-dev
          version: 1.0

      - name: Build Tauri app
        working-directory: app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build --target ${{ matrix.target }}

      - name: Collect artifacts into flat staging dir
        shell: bash
        run: |
          mkdir -p staging
          TARGET="${{ matrix.target }}"
          BUNDLE="app/src-tauri/target/${TARGET}/release/bundle"

          # macOS — rename updater archives to include arch so they don't collide
          if [[ "$TARGET" == *apple* ]]; then
            SHORT=$([[ "$TARGET" == aarch64* ]] && echo "aarch64" || echo "x64")
            for f in "$BUNDLE"/dmg/*.dmg; do [ -f "$f" ] && cp "$f" staging/; done
            for f in "$BUNDLE"/macos/*.app.tar.gz; do
              [ -f "$f" ] && cp "$f" "staging/Margin_${SHORT}.app.tar.gz"
            done
            for f in "$BUNDLE"/macos/*.app.tar.gz.sig; do
              [ -f "$f" ] && cp "$f" "staging/Margin_${SHORT}.app.tar.gz.sig"
            done
          fi

          # Linux (v2: updater reuses .AppImage directly, sig is .AppImage.sig)
          if [[ "$TARGET" == *linux* ]]; then
            for f in "$BUNDLE"/appimage/*.AppImage; do [ -f "$f" ] && cp "$f" staging/; done
            for f in "$BUNDLE"/appimage/*.AppImage.sig; do [ -f "$f" ] && cp "$f" staging/; done
            for f in "$BUNDLE"/deb/*.deb; do [ -f "$f" ] && cp "$f" staging/; done
          fi

          # Windows (v2: updater reuses .exe directly, sig is .exe.sig)
          if [[ "$TARGET" == *windows* ]]; then
            for f in "$BUNDLE"/nsis/*.exe; do [ -f "$f" ] && cp "$f" staging/; done
            for f in "$BUNDLE"/nsis/*.exe.sig; do [ -f "$f" ] && cp "$f" staging/; done
            for f in "$BUNDLE"/msi/*.msi; do [ -f "$f" ] && cp "$f" staging/; done
            for f in "$BUNDLE"/msi/*.msi.sig; do [ -f "$f" ] && cp "$f" staging/; done
          fi

          echo "=== Staged artifacts ==="
          ls -la staging/

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: tauri-${{ matrix.target }}
          path: staging/*
          if-no-files-found: ignore

  # ── GitHub Release with all artifacts ────────────────────────────────────
  publish-release:
    name: Publish GitHub Release
    needs: [tauri-build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v7
        with:
          pattern: tauri-*
          path: artifacts
          merge-multiple: true

      - name: List all artifacts
        run: |
          echo "=== All downloaded artifacts ==="
          find artifacts -type f | sort

      - name: Generate updater manifest (latest.json)
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          BASE="https://github.com/${{ github.repository }}/releases/download/${GITHUB_REF_NAME}"

          # Read signature from file, empty string if missing
          read_sig() {
            local f
            f=$(find artifacts -name "$1" -type f 2>/dev/null | head -1)
            if [ -n "$f" ] && [ -f "$f" ]; then cat "$f"; else echo ""; fi
          }

          DARWIN_AARCH64_SIG=$(read_sig "Margin_aarch64.app.tar.gz.sig")
          DARWIN_X86_SIG=$(read_sig "Margin_x64.app.tar.gz.sig")
          LINUX_SIG=$(read_sig "*.AppImage.sig")
          WINDOWS_SIG=$(read_sig "*.exe.sig")

          cat > latest.json <<-EOF
          {
            "version": "${VERSION}",
            "pub_date": "${DATE}",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${DARWIN_AARCH64_SIG}",
                "url": "${BASE}/Margin_aarch64.app.tar.gz"
              },
              "darwin-x86_64": {
                "signature": "${DARWIN_X86_SIG}",
                "url": "${BASE}/Margin_x64.app.tar.gz"
              },
              "linux-x86_64": {
                "signature": "${LINUX_SIG}",
                "url": "${BASE}/Margin_${VERSION}_amd64.AppImage"
              },
              "windows-x86_64": {
                "signature": "${WINDOWS_SIG}",
                "url": "${BASE}/Margin_${VERSION}_x64-setup.exe"
              }
            }
          }
          EOF

          echo "=== latest.json ==="
          cat latest.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*
            latest.json
